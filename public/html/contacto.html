<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Tienda Online</title>
</head>

<body>
    <header>
        <div class="logo-container">
            <p class="logo">Tienda<span>Online</span></p>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="./productos.html">Productos</a></li>
                <li><a href="./contacto.html">Contacto</a></li>
                <li><a href="./cart.html"><i class="fa-solid fa-cart-shopping"></i><span id="cart-count">0</span></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact-container">
            <h1>Contacto</h1>
            <div class="contact-description">
                <p>Si tienes alguna pregunta o necesitas ayuda, no dudes en contactarnos.</p>
                <p>Estamos aquí para ayudarte.</p>
            </div>
            <form class="contact-form">
                <!-- <label for="name">Nombre:</label> -->
                <input type="text" id="name" name="name" required placeholder="Tu nombre completo">
                
                <!-- <label for="email">Correo Electrónico:</label> -->
                <input type="email" id="email" name="email" required placeholder="Tu correo electrónico">
                
                <!-- <label for="message">Mensaje:</label> -->
                <textarea id="message" name="message" rows="5" required placeholder="Tu mensaje"></textarea>
                
                <button type="submit" class="btn-buy">Enviar Mensaje</button>
            </form>
        </section>
    </main>
    <footer>
        <div>
            <p><span>Trabajo Práctico PP2 - Pablo Demartini - IFTS-16</span>  -  &copy; 2026 Tienda Online. Todos los derechos reservados.</p>
        </div>
    </footer>
    <script src="../js/script.js"></script>
</body>

</html>
